<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Algorithmic Trading Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #080a10; color: #d1d4dc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;}
        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 10px; gap: 10px;}
        
        .header-panel { background-color: #12151f; border: 1px solid #222631; border-radius: 8px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        
        /* Custom Canvas Container */
        #chart-wrapper { flex: 1; position: relative; background: #0d1117; border: 1px solid #222631; border-radius: 8px; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair;}
        
        /* Overlays */
        #loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(13, 17, 23, 0.9); padding: 15px 25px; border-radius: 8px; z-index: 10; border: 1px solid #00e676; font-weight: bold; color: #fff; box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);}
        
        /* Auto-Bot HUD Overlay */
        #bot-hud { position: absolute; top: 20px; left: 20px; background: rgba(18, 21, 31, 0.85); border: 1px solid #222631; border-left: 4px solid #0d6efd; padding: 15px; border-radius: 6px; z-index: 5; backdrop-filter: blur(4px); min-width: 280px; pointer-events: none;}
        
        .live-badge { background-color: #00e676; color: #000; animation: pulse 2s infinite; font-weight: bold;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .btn-timeframe.active { background-color: #0d6efd; color: white; border-color: #0d6efd; }
        .form-select-bg { background-color: #1a1e29; color: #fff; border: 1px solid #363c4e; font-weight: bold;}
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-panel">
        <div class="d-flex align-items-center gap-3">
            <select class="form-select form-select-bg" id="asset-select" style="width: 150px;">
                <option value="XAU/USD">🥇 XAU/USD</option>
                <option value="EUR/USD">💶 EUR/USD</option>
                <option value="GBP/USD">💷 GBP/USD</option>
                <option value="USD/JPY">💴 USD/JPY</option>
                <option value="USD/CAD">💵 USD/CAD</option>
                <option value="USD/CHF">₣ USD/CHF</option>
            </select>
            
            <span class="badge live-badge fs-6"><i class="fa-solid fa-bolt"></i> DATA SYNC</span>
            <span class="badge bg-primary font-monospace fs-6" id="candle-timer">00:00</span>
        </div>

        <div class="btn-group" role="group">
            <button class="btn btn-outline-secondary btn-sm btn-timeframe active" data-interval="5min">5m</button>
            <button class="btn btn-outline-secondary btn-sm btn-timeframe" data-interval="15min">15m</button>
            <button class="btn btn-outline-secondary btn-sm btn-timeframe" data-interval="1h">1H</button>
            <button class="btn btn-outline-secondary btn-sm btn-timeframe" data-interval="4h">4H</button>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="text-white small fw-bold" id="market-sentiment">Sentiment: Neutral</div>
            <div class="text-secondary font-monospace small" id="next-update">Next Poll: 30s</div>
        </div>
    </div>

    <div id="chart-wrapper">
        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Analyzing Confluence Data...</div>
        
        <div id="bot-hud">
            <h6 class="text-white mb-2 border-bottom border-secondary pb-2"><i class="fa-solid fa-crosshairs text-primary"></i> High-Prob Signals Only</h6>
            <div id="hud-status" class="fs-5 fw-bold text-secondary mb-2">Scanning Trend...</div>
            <div id="hud-details" class="small text-secondary font-monospace lh-lg">
                Entry: --<br>
                Target: --<br>
                Stop: --
            </div>
        </div>

        <canvas id="customChart"></canvas>
    </div>
</div>

<script>
    // --- 1. Global Config & State ---
    const API_KEY = "b2c7d75a119049978c58ea7514b72be9";
    let currentData = [];
    let isFetching = false;
    let activeInterval = '5min';
    let activeSymbol = 'XAU/USD';
    
    let visibleCandles = 100; 
    const MAX_CANDLES = 300; 
    const MIN_CANDLES = 30;  
    
    let botCurrentTrade = null; 
    let mouseCanvasY = null;

    // --- 2. Canvas Setup ---
    const canvas = document.getElementById('customChart');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('chart-wrapper');

    function resizeCanvas() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        if(currentData.length > 0) renderChart();
    }
    window.addEventListener('resize', resizeCanvas);

    canvas.addEventListener('wheel', (e) => {
        e.preventDefault(); 
        const zoomSpeed = 8;
        if (e.deltaY > 0) visibleCandles = Math.min(visibleCandles + zoomSpeed, currentData.length);
        else visibleCandles = Math.max(visibleCandles - zoomSpeed, MIN_CANDLES);
        renderChart();
    });
    canvas.addEventListener('mousemove', (e) => { mouseCanvasY = e.clientY - canvas.getBoundingClientRect().top; renderChart(); });
    canvas.addEventListener('mouseleave', () => { mouseCanvasY = null; renderChart(); });

    // --- 3. Technical Analysis Engine (Math) ---
    function calculateSMA(data, period) {
        let sma = new Array(data.length).fill(null);
        for (let i = period - 1; i < data.length; i++) {
            let sum = 0;
            for (let j = 0; j < period; j++) sum += data[i - j].close;
            sma[i] = sum / period;
        }
        return sma;
    }

    // --- 4. Automated Bot Logic Engine (Filtered Signals) ---
    function runAutoBot(chartData) {
        botCurrentTrade = null;
        
        // Calculate Technicals for Filtering
        const sma20 = calculateSMA(chartData, 20);
        const sma50 = calculateSMA(chartData, 50);

        // Update Market Sentiment UI
        const lastSMA20 = sma20[sma20.length - 1];
        const lastSMA50 = sma50[sma50.length - 1];
        const lastClose = chartData[chartData.length - 1].close;
        const sentimentEl = document.getElementById('market-sentiment');
        
        if (lastSMA20 && lastSMA50) {
            if (lastSMA20 > lastSMA50 && lastClose > lastSMA20) sentimentEl.innerHTML = '<span class="text-success"><i class="fa-solid fa-arrow-up"></i> Strong Bullish</span>';
            else if (lastSMA20 < lastSMA50 && lastClose < lastSMA20) sentimentEl.innerHTML = '<span class="text-danger"><i class="fa-solid fa-arrow-down"></i> Strong Bearish</span>';
            else sentimentEl.innerHTML = '<span class="text-warning"><i class="fa-solid fa-arrows-left-right"></i> Ranging / Neutral</span>';
        }

        // Scan for High-Accuracy Signals
        for (let i = 50; i < chartData.length; i++) {
            const prev = chartData[i - 1];
            const candle = chartData[i];
            
            // Trend conditions
            const isUptrend = sma20[i] > sma50[i];
            const isDowntrend = sma20[i] < sma50[i];

            if (!botCurrentTrade) {
                // STRONG BUY: Bullish Engulfing AND in an Uptrend
                if (isUptrend && prev.close < prev.open && candle.close > candle.open && candle.open <= prev.close && candle.close >= prev.open) {
                    const pipBuffer = activeSymbol.includes('JPY') ? 0.05 : (activeSymbol === 'XAU/USD' ? 0.5 : 0.0005);
                    botCurrentTrade = { 
                        type: 'BUY', entry: candle.close, 
                        sl: candle.low - pipBuffer, tp: candle.close + ((candle.close - (candle.low - pipBuffer)) * 2), 
                        startIndex: i, startX: 0 
                    };
                }
                // STRONG SELL: Bearish Engulfing AND in a Downtrend
                else if (isDowntrend && prev.close > prev.open && candle.close < candle.open && candle.open >= prev.close && candle.close <= prev.open) {
                    const pipBuffer = activeSymbol.includes('JPY') ? 0.05 : (activeSymbol === 'XAU/USD' ? 0.5 : 0.0005);
                    botCurrentTrade = { 
                        type: 'SELL', entry: candle.close, 
                        sl: candle.high + pipBuffer, tp: candle.close - (((candle.high + pipBuffer) - candle.close) * 2), 
                        startIndex: i, startX: 0
                    };
                }
            } else {
                if (botCurrentTrade.type === 'BUY') {
                    if (candle.low <= botCurrentTrade.sl || candle.high >= botCurrentTrade.tp) botCurrentTrade = null;
                } else if (botCurrentTrade.type === 'SELL') {
                    if (candle.high >= botCurrentTrade.sl || candle.low <= botCurrentTrade.tp) botCurrentTrade = null;
                }
            }
        }
        updateHUD();
    }

    function updateHUD() {
        const statusEl = document.getElementById('hud-status');
        const detailsEl = document.getElementById('hud-details');
        const hudBox = document.getElementById('bot-hud');
        const dec = activeSymbol.includes('JPY') ? 3 : (activeSymbol === 'XAU/USD' ? 2 : 5);

        if (botCurrentTrade) {
            const isBuy = botCurrentTrade.type === 'BUY';
            hudBox.style.borderLeftColor = isBuy ? '#00e676' : '#ff5252';
            statusEl.innerHTML = `<span style="color: ${isBuy ? '#00e676' : '#ff5252'};"><i class="fa-solid ${isBuy ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i> CONFIRMED ${botCurrentTrade.type}</span>`;
            detailsEl.innerHTML = `
                <span class="text-white">Entry:</span> ${botCurrentTrade.entry.toFixed(dec)}<br>
                <span style="color: #00e676;">Target:</span> ${botCurrentTrade.tp.toFixed(dec)}<br>
                <span style="color: #ff5252;">Stop:</span> ${botCurrentTrade.sl.toFixed(dec)}
            `;
        } else {
            hudBox.style.borderLeftColor = '#6c757d';
            statusEl.innerHTML = `<span class="text-secondary"><i class="fa-solid fa-shield-halved"></i> Filtering Noise...</span>`;
            detailsEl.innerHTML = `Waiting for trend<br>alignment and pure<br>price action breakout.`;
        }
    }

    // --- 5. Core Render Engine ---
    function renderChart() {
        if (!currentData || currentData.length === 0) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const chartData = currentData.slice(-visibleCandles);
        const dec = activeSymbol.includes('JPY') ? 3 : (activeSymbol === 'XAU/USD' ? 2 : 5);
        
        const padding = { top: 30, bottom: 30, left: 0, right: 80 }; 
        const drawWidth = canvas.width - padding.left - padding.right;
        const drawHeight = canvas.height - padding.top - padding.bottom;
        const spacing = (drawWidth / chartData.length);
        const candleWidth = Math.max(spacing * 0.7, 1);

        runAutoBot(chartData);

        let maxPrice = Math.max(...chartData.map(d => d.high));
        let minPrice = Math.min(...chartData.map(d => d.low));

        if (botCurrentTrade) {
            maxPrice = Math.max(maxPrice, botCurrentTrade.tp, botCurrentTrade.sl);
            minPrice = Math.min(minPrice, botCurrentTrade.tp, botCurrentTrade.sl);
        }

        const paddingVal = (maxPrice - minPrice) * 0.1; 
        maxPrice += paddingVal; minPrice -= paddingVal;
        const priceRange = maxPrice - minPrice || 1;
        const getY = (price) => padding.top + drawHeight - ((price - minPrice) / priceRange) * drawHeight;

        // Draw Grid
        ctx.strokeStyle = 'rgba(42, 46, 57, 0.5)'; ctx.lineWidth = 1; ctx.fillStyle = '#787b86'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
        for (let i = 0; i <= 8; i++) {
            const y = padding.top + (drawHeight / 8) * i;
            const priceLevel = maxPrice - (priceRange / 8) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width - padding.right, y); ctx.stroke();
            ctx.fillText(priceLevel.toFixed(dec), canvas.width - padding.right + 10, y + 4);
        }

        // Draw Pure Accuracy S/R (Pivot Points based on visible data)
        const vHigh = Math.max(...chartData.map(d => d.high));
        const vLow = Math.min(...chartData.map(d => d.low));
        const vClose = chartData[chartData.length-1].close;
        const pivot = (vHigh + vLow + vClose) / 3;
        const r1 = (2 * pivot) - vLow;
        const s1 = (2 * pivot) - vHigh;

        ctx.setLineDash([2, 4]); ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(255, 82, 82, 0.5)'; ctx.beginPath(); ctx.moveTo(0, getY(r1)); ctx.lineTo(canvas.width - padding.right, getY(r1)); ctx.stroke();
        ctx.fillStyle = 'rgba(255, 82, 82, 0.5)'; ctx.fillText(`RES`, 10, getY(r1) - 5);
        
        ctx.strokeStyle = 'rgba(0, 230, 118, 0.5)'; ctx.beginPath(); ctx.moveTo(0, getY(s1)); ctx.lineTo(canvas.width - padding.right, getY(s1)); ctx.stroke();
        ctx.fillStyle = 'rgba(0, 230, 118, 0.5)'; ctx.fillText(`SUP`, 10, getY(s1) - 5);

        // Draw Bot Trade Zones
        if (botCurrentTrade) {
            botCurrentTrade.startX = padding.left + (botCurrentTrade.startIndex * spacing) + (spacing / 2);
            const startX = botCurrentTrade.startX; 
            const endX = canvas.width - padding.right;

            ctx.fillStyle = 'rgba(0, 230, 118, 0.12)'; ctx.fillRect(startX, Math.min(getY(botCurrentTrade.entry), getY(botCurrentTrade.tp)), endX - startX, Math.abs(getY(botCurrentTrade.tp) - getY(botCurrentTrade.entry)));
            ctx.fillStyle = 'rgba(255, 82, 82, 0.12)'; ctx.fillRect(startX, Math.min(getY(botCurrentTrade.entry), getY(botCurrentTrade.sl)), endX - startX, Math.abs(getY(botCurrentTrade.sl) - getY(botCurrentTrade.entry)));

            ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(startX, getY(botCurrentTrade.entry)); ctx.lineTo(endX, getY(botCurrentTrade.entry)); ctx.stroke();
            
            ctx.strokeStyle = '#00e676'; ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(startX, getY(botCurrentTrade.tp)); ctx.lineTo(endX, getY(botCurrentTrade.tp)); ctx.stroke();
            ctx.fillStyle = '#00e676'; ctx.fillText(`TP`, startX + 5, getY(botCurrentTrade.tp) - 5);
            
            ctx.strokeStyle = '#ff5252'; ctx.beginPath(); ctx.moveTo(startX, getY(botCurrentTrade.sl)); ctx.lineTo(endX, getY(botCurrentTrade.sl)); ctx.stroke();
            ctx.fillStyle = '#ff5252'; ctx.fillText(`SL`, startX + 5, getY(botCurrentTrade.sl) + 15);
        }

        // Draw Candlesticks
        ctx.setLineDash([]);
        chartData.forEach((candle, index) => {
            const x = padding.left + (index * spacing) + (spacing / 2);
            const isBullish = candle.close >= candle.open;
            
            ctx.strokeStyle = isBullish ? '#00e676' : '#ff5252'; 
            ctx.fillStyle = isBullish ? '#00e676' : '#ff5252';
            
            ctx.beginPath(); ctx.moveTo(x, getY(candle.high)); ctx.lineTo(x, getY(candle.low)); ctx.lineWidth = 1.5; ctx.stroke();
            const bodyHeight = Math.max(Math.abs(getY(candle.close) - getY(candle.open)), 1); 
            ctx.fillRect(x - candleWidth/2, Math.min(getY(candle.open), getY(candle.close)), candleWidth, bodyHeight);

            if (botCurrentTrade && botCurrentTrade.startIndex === index) {
                const yPos = botCurrentTrade.type === 'BUY' ? getY(candle.low) + 8 : getY(candle.high) - 8;
                const dir = botCurrentTrade.type === 'BUY' ? 12 : -12;
                ctx.beginPath(); ctx.moveTo(x, yPos); ctx.lineTo(x - 6, yPos + dir); ctx.lineTo(x + 6, yPos + dir); ctx.fill();
            }
        });

        // Hover Crosshair
        if (mouseCanvasY !== null && mouseCanvasY > padding.top && mouseCanvasY < canvas.height - padding.bottom) {
            ctx.setLineDash([4, 4]); ctx.lineWidth = 1; ctx.strokeStyle = '#6c757d';
            ctx.beginPath(); ctx.moveTo(0, mouseCanvasY); ctx.lineTo(canvas.width - padding.right, mouseCanvasY); ctx.stroke();
            
            const hoverPrice = minPrice + ((padding.top + drawHeight - mouseCanvasY) / drawHeight) * priceRange;
            ctx.fillStyle = '#6c757d'; ctx.fillRect(canvas.width - padding.right, mouseCanvasY - 10, padding.right, 20);
            ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif'; ctx.fillText(hoverPrice.toFixed(dec), canvas.width - padding.right + 5, mouseCanvasY + 4);
        }

        // Live Price Tag
        const currentPrice = chartData[chartData.length - 1].close;
        const cy = getY(currentPrice);
        ctx.strokeStyle = '#0d6efd'; ctx.setLineDash([]); ctx.lineWidth = 2; 
        ctx.beginPath(); ctx.moveTo(canvas.width - padding.right - 10, cy); ctx.lineTo(canvas.width - padding.right, cy); ctx.stroke();
        
        ctx.fillStyle = '#0d6efd'; ctx.fillRect(canvas.width - padding.right, cy - 12, padding.right, 24);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.fillText(currentPrice.toFixed(dec), canvas.width - padding.right + 8, cy + 4); 
    }

    // --- 6. Data Fetching & Timers ---
    let autoSyncTimer, countdownTimer, candleCloseInterval;
    let secondsToUpdate = 30;

    async function fetchRealData() {
        if (isFetching) return;
        isFetching = true;
        if(currentData.length === 0) document.getElementById('loading').style.display = 'block';
        
        // Dynamic Symbol Fetching
        const url = `https://api.twelvedata.com/time_series?symbol=${activeSymbol}&interval=${activeInterval}&outputsize=${MAX_CANDLES}&apikey=${API_KEY}`;
        
        try {
            const response = await fetch(url);
            const json = await response.json();
            
            if (json.code === 429) {
                document.getElementById('hud-status').innerHTML = "<span class='text-danger'>Rate Limit Hit. Waiting...</span>";
                return;
            }
            if (json.status === 'error') return;

            currentData = json.values.map(d => ({
                time: d.datetime, open: parseFloat(d.open), high: parseFloat(d.high), low: parseFloat(d.low), close: parseFloat(d.close)
            })).reverse();
            
            visibleCandles = Math.min(visibleCandles, currentData.length);
            renderChart();
        } catch (error) {
            console.error("Data error:", error);
        } finally {
            document.getElementById('loading').style.display = 'none';
            isFetching = false;
            resetSyncTimer();
        }
    }

    function resetSyncTimer() {
        clearInterval(autoSyncTimer); clearInterval(countdownTimer);
        secondsToUpdate = 30; 
        countdownTimer = setInterval(() => {
            secondsToUpdate--;
            document.getElementById('next-update').innerHTML = secondsToUpdate <= 0 ? `Syncing...` : `Next Poll: ${secondsToUpdate}s`;
        }, 1000);
        autoSyncTimer = setInterval(fetchRealData, 30000);
    }

    function startCandleTimer() {
        clearInterval(candleCloseInterval);
        candleCloseInterval = setInterval(() => {
            const currentMs = new Date().getTime();
            let msPerCandle = 5 * 60 * 1000; 
            if (activeInterval === '15min') msPerCandle = 15 * 60 * 1000;
            else if (activeInterval === '1h') msPerCandle = 60 * 60 * 1000;
            else if (activeInterval === '4h') msPerCandle = 4 * 60 * 60 * 1000;

            const remainingMs = msPerCandle - (currentMs % msPerCandle);
            const m = Math.floor((remainingMs / 1000 / 60) % 60).toString().padStart(2, '0');
            const s = Math.floor((remainingMs / 1000) % 60).toString().padStart(2, '0');
            document.getElementById('candle-timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    // --- 7. Initialization & Event Listeners ---
    document.querySelectorAll('.btn-timeframe').forEach(btn => {
        btn.addEventListener('click', (e) => {
            if (isFetching) return;
            document.querySelectorAll('.btn-timeframe').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeInterval = e.target.dataset.interval;
            currentData = []; startCandleTimer(); fetchRealData();
        });
    });

    document.getElementById('asset-select').addEventListener('change', (e) => {
        if (isFetching) return;
        activeSymbol = e.target.value;
        currentData = []; 
        document.getElementById('market-sentiment').innerHTML = 'Analyzing...';
        fetchRealData();
    });

    document.addEventListener('DOMContentLoaded', () => {
        resizeCanvas(); startCandleTimer(); fetchRealData(); 
    });
</script>
</body>
</html>
