<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fully Automated XAU/USD Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #080a10; color: #d1d4dc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden;}
        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 10px; }
        
        .header-panel { background-color: #12151f; border: 1px solid #222631; border-radius: 8px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3);}
        
        /* Custom Canvas Container */
        #chart-wrapper { flex: 1; position: relative; background: #0d1117; border: 1px solid #222631; border-radius: 8px; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: crosshair;}
        
        /* Overlays */
        #loading { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(13, 17, 23, 0.9); padding: 15px 25px; border-radius: 8px; z-index: 10; border: 1px solid #00e676; font-weight: bold; color: #fff; box-shadow: 0 0 20px rgba(0, 230, 118, 0.2);}
        
        /* Auto-Bot HUD Overlay */
        #bot-hud { position: absolute; top: 20px; left: 20px; background: rgba(18, 21, 31, 0.85); border: 1px solid #222631; border-left: 4px solid #0d6efd; padding: 15px; border-radius: 6px; z-index: 5; backdrop-filter: blur(4px); min-width: 280px; pointer-events: none;}
        
        .live-badge { background-color: #00e676; color: #000; animation: pulse 2s infinite; font-weight: bold;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .btn-timeframe.active { background-color: #0d6efd; color: white; border-color: #0d6efd; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-panel">
        <div class="d-flex align-items-center gap-3">
            <h3 class="m-0 text-white"><i class="fa-solid fa-robot text-primary"></i> XAU/USD Auto-Engine</h3>
            <span class="badge live-badge fs-6"><i class="fa-solid fa-bolt"></i> LIVE SYNC</span>
            <span class="badge bg-primary font-monospace fs-6" id="candle-timer">00:00</span>
        </div>

        <div class="btn-group" role="group">
            <button class="btn btn-outline-secondary btn-sm btn-timeframe active" data-interval="5min">5m</button>
            <button class="btn btn-outline-secondary btn-sm btn-timeframe" data-interval="15min">15m</button>
            <button class="btn btn-outline-secondary btn-sm btn-timeframe" data-interval="1h">1H</button>
            <button class="btn btn-outline-secondary btn-sm btn-timeframe" data-interval="4h">4H</button>
        </div>

        <div class="d-flex align-items-center gap-3">
            <div class="form-check form-switch m-0">
                <input class="form-check-input" type="checkbox" id="sr-toggle">
                <label class="form-check-label small text-secondary" for="sr-toggle">Show S/R</label>
            </div>
            <div class="text-secondary font-monospace small" id="next-update">Next Poll: 30s</div>
        </div>
    </div>

    <div id="chart-wrapper">
        <div id="loading"><i class="fa-solid fa-circle-notch fa-spin"></i> Synchronizing Market Node...</div>
        
        <div id="bot-hud">
            <h6 class="text-white mb-2 border-bottom border-secondary pb-2"><i class="fa-solid fa-microchip text-primary"></i> Algorithm Status</h6>
            <div id="hud-status" class="fs-5 fw-bold text-secondary mb-2">Scanning Data...</div>
            <div id="hud-details" class="small text-secondary font-monospace lh-lg">
                Entry: --<br>
                Target: --<br>
                Stop: --
            </div>
        </div>

        <canvas id="customChart"></canvas>
    </div>
</div>

<script>
    // --- 1. Global Config & State ---
    const API_KEY = "b2c7d75a119049978c58ea7514b72be9";
    let currentData = [];
    let isFetching = false;
    let activeInterval = '5min';
    
    let visibleCandles = 100; 
    const MAX_CANDLES = 300; 
    const MIN_CANDLES = 30;  
    
    // Auto-Bot State Trackers
    let botCurrentTrade = null; // Holds the active trade being tracked
    let mouseHoverPrice = null;
    let mouseCanvasY = null;

    // --- 2. Canvas Setup ---
    const canvas = document.getElementById('customChart');
    const ctx = canvas.getContext('2d');
    const wrapper = document.getElementById('chart-wrapper');

    function resizeCanvas() {
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;
        if(currentData.length > 0) renderChart();
    }
    window.addEventListener('resize', resizeCanvas);

    // --- 3. Interactive Zoom & Hover ---
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault(); 
        const zoomSpeed = 8;
        if (e.deltaY > 0) visibleCandles = Math.min(visibleCandles + zoomSpeed, currentData.length);
        else visibleCandles = Math.max(visibleCandles - zoomSpeed, MIN_CANDLES);
        renderChart();
    });

    canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        mouseCanvasY = e.clientY - rect.top;
        renderChart(); // Fast re-render for crosshair
    });

    canvas.addEventListener('mouseleave', () => { mouseCanvasY = null; renderChart(); });

    // --- 4. Automated Bot Logic Engine ---
    function runAutoBot(chartData) {
        botCurrentTrade = null;
        
        // Scan visible data for the MOST RECENT unresolved signal
        for (let i = 1; i < chartData.length; i++) {
            const prev = chartData[i - 1];
            const candle = chartData[i];

            // If we are currently NOT in a trade, look for a new setup
            if (!botCurrentTrade) {
                // Bullish Engulfing
                if (prev.close < prev.open && candle.close > candle.open && candle.open <= prev.close && candle.close >= prev.open) {
                    botCurrentTrade = { 
                        type: 'BUY', status: 'ACTIVE', entry: candle.close, 
                        sl: candle.low - 0.5, tp: candle.close + ((candle.close - (candle.low - 0.5)) * 2), 
                        startIndex: i, startX: 0 // X updated in render loop
                    };
                }
                // Bearish Engulfing
                else if (prev.close > prev.open && candle.close < candle.open && candle.open >= prev.close && candle.close <= prev.open) {
                    botCurrentTrade = { 
                        type: 'SELL', status: 'ACTIVE', entry: candle.close, 
                        sl: candle.high + 0.5, tp: candle.close - (((candle.high + 0.5) - candle.close) * 2), 
                        startIndex: i, startX: 0
                    };
                }
            } 
            // If we ARE in a trade, check if this candle hit the SL or TP
            else {
                if (botCurrentTrade.type === 'BUY') {
                    if (candle.low <= botCurrentTrade.sl) botCurrentTrade = null; // Stopped out, reset
                    else if (candle.high >= botCurrentTrade.tp) botCurrentTrade = null; // Target hit, reset
                } else if (botCurrentTrade.type === 'SELL') {
                    if (candle.high >= botCurrentTrade.sl) botCurrentTrade = null;
                    else if (candle.low <= botCurrentTrade.tp) botCurrentTrade = null;
                }
            }
        }
        
        updateHUD();
    }

    function updateHUD() {
        const statusEl = document.getElementById('hud-status');
        const detailsEl = document.getElementById('hud-details');
        const hudBox = document.getElementById('bot-hud');

        if (botCurrentTrade) {
            const isBuy = botCurrentTrade.type === 'BUY';
            hudBox.style.borderLeftColor = isBuy ? '#00e676' : '#ff5252';
            statusEl.innerHTML = `<span style="color: ${isBuy ? '#00e676' : '#ff5252'};"><i class="fa-solid ${isBuy ? 'fa-arrow-trend-up' : 'fa-arrow-trend-down'}"></i> ACTIVE ${botCurrentTrade.type}</span>`;
            detailsEl.innerHTML = `
                <span class="text-white">Entry:</span> ${botCurrentTrade.entry.toFixed(2)}<br>
                <span style="color: #00e676;">Target:</span> ${botCurrentTrade.tp.toFixed(2)}<br>
                <span style="color: #ff5252;">Stop:</span> ${botCurrentTrade.sl.toFixed(2)}
            `;
        } else {
            hudBox.style.borderLeftColor = '#6c757d';
            statusEl.innerHTML = `<span class="text-secondary"><i class="fa-solid fa-radar"></i> Scanning...</span>`;
            detailsEl.innerHTML = `Waiting for algorithm<br>to confirm next<br>engulfing breakout.`;
        }
    }

    // --- 5. Core Render Engine ---
    function renderChart() {
        if (!currentData || currentData.length === 0) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const chartData = currentData.slice(-visibleCandles);
        const padding = { top: 30, bottom: 30, left: 0, right: 70 }; 
        const drawWidth = canvas.width - padding.left - padding.right;
        const drawHeight = canvas.height - padding.top - padding.bottom;
        const spacing = (drawWidth / chartData.length);
        const candleWidth = Math.max(spacing * 0.7, 1);

        // Run Bot Logic
        runAutoBot(chartData);

        // --- Dynamic Y-Axis Scaling ---
        let maxPrice = Math.max(...chartData.map(d => d.high));
        let minPrice = Math.min(...chartData.map(d => d.low));

        if (botCurrentTrade) {
            maxPrice = Math.max(maxPrice, botCurrentTrade.tp, botCurrentTrade.sl);
            minPrice = Math.min(minPrice, botCurrentTrade.tp, botCurrentTrade.sl);
        }

        const paddingVal = (maxPrice - minPrice) * 0.08; // 8% padding
        maxPrice += paddingVal; minPrice -= paddingVal;
        const priceRange = maxPrice - minPrice || 1;
        const getY = (price) => padding.top + drawHeight - ((price - minPrice) / priceRange) * drawHeight;

        // --- Draw Grid ---
        ctx.strokeStyle = 'rgba(42, 46, 57, 0.5)'; ctx.lineWidth = 1; ctx.fillStyle = '#787b86'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
        for (let i = 0; i <= 6; i++) {
            const y = padding.top + (drawHeight / 6) * i;
            const priceLevel = maxPrice - (priceRange / 6) * i;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width - padding.right, y); ctx.stroke();
            ctx.fillText(priceLevel.toFixed(2), canvas.width - padding.right + 10, y + 4);
        }

        // --- Draw Automated Trade Zones ---
        if (botCurrentTrade) {
            botCurrentTrade.startX = padding.left + (botCurrentTrade.startIndex * spacing) + (spacing / 2);
            const startX = botCurrentTrade.startX; 
            const endX = canvas.width - padding.right;

            // Profit Zone
            ctx.fillStyle = 'rgba(0, 230, 118, 0.12)'; 
            ctx.fillRect(startX, Math.min(getY(botCurrentTrade.entry), getY(botCurrentTrade.tp)), endX - startX, Math.abs(getY(botCurrentTrade.tp) - getY(botCurrentTrade.entry)));
            
            // Risk Zone
            ctx.fillStyle = 'rgba(255, 82, 82, 0.12)'; 
            ctx.fillRect(startX, Math.min(getY(botCurrentTrade.entry), getY(botCurrentTrade.sl)), endX - startX, Math.abs(getY(botCurrentTrade.sl) - getY(botCurrentTrade.entry)));

            // Lines & Labels
            ctx.lineWidth = 1.5; ctx.setLineDash([4, 4]);
            
            // Entry
            ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(startX, getY(botCurrentTrade.entry)); ctx.lineTo(endX, getY(botCurrentTrade.entry)); ctx.stroke();
            
            // Target
            ctx.strokeStyle = '#00e676'; ctx.setLineDash([]); ctx.beginPath(); ctx.moveTo(startX, getY(botCurrentTrade.tp)); ctx.lineTo(endX, getY(botCurrentTrade.tp)); ctx.stroke();
            ctx.fillStyle = '#00e676'; ctx.fillText(`TP: ${botCurrentTrade.tp.toFixed(2)}`, startX + 5, getY(botCurrentTrade.tp) - 5);
            
            // Stop
            ctx.strokeStyle = '#ff5252'; ctx.beginPath(); ctx.moveTo(startX, getY(botCurrentTrade.sl)); ctx.lineTo(endX, getY(botCurrentTrade.sl)); ctx.stroke();
            ctx.fillStyle = '#ff5252'; ctx.fillText(`SL: ${botCurrentTrade.sl.toFixed(2)}`, startX + 5, getY(botCurrentTrade.sl) + 15);
        }

        // --- Draw Support/Resistance ---
        if (document.getElementById('sr-toggle').checked) {
            const resPrice = Math.max(...chartData.map(d => d.high));
            const supPrice = Math.min(...chartData.map(d => d.low));
            ctx.setLineDash([2, 4]); ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(255, 82, 82, 0.5)'; ctx.beginPath(); ctx.moveTo(0, getY(resPrice)); ctx.lineTo(canvas.width - padding.right, getY(resPrice)); ctx.stroke();
            ctx.strokeStyle = 'rgba(0, 230, 118, 0.5)'; ctx.beginPath(); ctx.moveTo(0, getY(supPrice)); ctx.lineTo(canvas.width - padding.right, getY(supPrice)); ctx.stroke();
        }

        // --- Draw Candlesticks ---
        ctx.setLineDash([]);
        chartData.forEach((candle, index) => {
            const x = padding.left + (index * spacing) + (spacing / 2);
            const isBullish = candle.close >= candle.open;
            
            ctx.strokeStyle = isBullish ? '#00e676' : '#ff5252'; 
            ctx.fillStyle = isBullish ? '#00e676' : '#ff5252';
            
            // Wick
            ctx.beginPath(); ctx.moveTo(x, getY(candle.high)); ctx.lineTo(x, getY(candle.low)); ctx.lineWidth = 1.5; ctx.stroke();

            // Body
            const bodyHeight = Math.max(Math.abs(getY(candle.close) - getY(candle.open)), 1); 
            ctx.fillRect(x - candleWidth/2, Math.min(getY(candle.open), getY(candle.close)), candleWidth, bodyHeight);

            // Signal Arrow
            if (botCurrentTrade && botCurrentTrade.startIndex === index) {
                const yPos = botCurrentTrade.type === 'BUY' ? getY(candle.low) + 8 : getY(candle.high) - 8;
                const dir = botCurrentTrade.type === 'BUY' ? 12 : -12;
                ctx.beginPath(); ctx.moveTo(x, yPos); ctx.lineTo(x - 6, yPos + dir); ctx.lineTo(x + 6, yPos + dir); ctx.fill();
            }
        });

        // --- Hover Crosshair ---
        if (mouseCanvasY !== null && mouseCanvasY > padding.top && mouseCanvasY < canvas.height - padding.bottom) {
            ctx.setLineDash([4, 4]); ctx.lineWidth = 1; ctx.strokeStyle = '#6c757d';
            ctx.beginPath(); ctx.moveTo(0, mouseCanvasY); ctx.lineTo(canvas.width - padding.right, mouseCanvasY); ctx.stroke();
            
            const hoverPrice = minPrice + ((padding.top + drawHeight - mouseCanvasY) / drawHeight) * priceRange;
            ctx.fillStyle = '#6c757d'; ctx.fillRect(canvas.width - padding.right, mouseCanvasY - 10, padding.right, 20);
            ctx.fillStyle = '#fff'; ctx.font = '11px sans-serif'; ctx.fillText(hoverPrice.toFixed(2), canvas.width - padding.right + 5, mouseCanvasY + 4);
        }

        // --- Current Live Price Tag ---
        const currentPrice = chartData[chartData.length - 1].close;
        const cy = getY(currentPrice);
        ctx.strokeStyle = '#0d6efd'; ctx.setLineDash([]); ctx.lineWidth = 2; 
        ctx.beginPath(); ctx.moveTo(canvas.width - padding.right - 10, cy); ctx.lineTo(canvas.width - padding.right, cy); ctx.stroke();
        
        ctx.fillStyle = '#0d6efd'; ctx.fillRect(canvas.width - padding.right, cy - 12, padding.right, 24);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.fillText(currentPrice.toFixed(2), canvas.width - padding.right + 8, cy + 4); 
    }

    // --- 6. Data Fetching & Timers ---
    let autoSyncTimer, countdownTimer, candleCloseInterval;
    let secondsToUpdate = 30;

    async function fetchRealData() {
        if (isFetching) return;
        isFetching = true;
        if(currentData.length === 0) document.getElementById('loading').style.display = 'block';
        
        const url = `https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${activeInterval}&outputsize=${MAX_CANDLES}&apikey=${API_KEY}`;
        
        try {
            const response = await fetch(url);
            const json = await response.json();
            if (json.code === 429 || json.status === 'error') return;

            currentData = json.values.map(d => ({
                time: d.datetime, open: parseFloat(d.open), high: parseFloat(d.high), low: parseFloat(d.low), close: parseFloat(d.close)
            })).reverse();
            
            visibleCandles = Math.min(visibleCandles, currentData.length);
            renderChart();
        } catch (error) {
            console.error("Data error:", error);
        } finally {
            document.getElementById('loading').style.display = 'none';
            isFetching = false;
            resetSyncTimer();
        }
    }

    function resetSyncTimer() {
        clearInterval(autoSyncTimer); clearInterval(countdownTimer);
        secondsToUpdate = 30; 
        countdownTimer = setInterval(() => {
            secondsToUpdate--;
            document.getElementById('next-update').innerHTML = secondsToUpdate <= 0 ? `Syncing...` : `Next Poll: ${secondsToUpdate}s`;
        }, 1000);
        autoSyncTimer = setInterval(fetchRealData, 30000);
    }

    function startCandleTimer() {
        clearInterval(candleCloseInterval);
        candleCloseInterval = setInterval(() => {
            const currentMs = new Date().getTime();
            let msPerCandle = 5 * 60 * 1000; 
            if (activeInterval === '15min') msPerCandle = 15 * 60 * 1000;
            else if (activeInterval === '1h') msPerCandle = 60 * 60 * 1000;
            else if (activeInterval === '4h') msPerCandle = 4 * 60 * 60 * 1000;

            const remainingMs = msPerCandle - (currentMs % msPerCandle);
            const m = Math.floor((remainingMs / 1000 / 60) % 60).toString().padStart(2, '0');
            const s = Math.floor((remainingMs / 1000) % 60).toString().padStart(2, '0');
            document.getElementById('candle-timer').innerText = `${m}:${s}`;
        }, 1000);
    }

    // --- 7. Initialization ---
    document.querySelectorAll('.btn-timeframe').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.btn-timeframe').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            activeInterval = e.target.dataset.interval;
            currentData = []; startCandleTimer(); fetchRealData();
        });
    });

    document.getElementById('sr-toggle').addEventListener('change', renderChart);

    document.addEventListener('DOMContentLoaded', () => {
        resizeCanvas(); startCandleTimer(); fetchRealData(); 
    });
</script>
</body>
</html>
